<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigQuery Release Pulse - Live Updates & Social Publisher</title>
    <meta name="description" content="Stay updated with the latest Google Cloud BigQuery release notes, features, fixes, and announcements. Search, analyze metrics, and tweet updates directly.">
    <meta name="keywords" content="Google Cloud, BigQuery, Release Notes, Database, SQL, BigQuery Updates, Twitter Publisher">
    <meta name="author" content="BigQuery Release Pulse">
    
    <!-- Open Graph Metadata -->
    <meta property="og:title" content="BigQuery Release Pulse - Live Updates">
    <meta property="og:description" content="Stay updated with the latest Google Cloud BigQuery release notes, features, and fixes. Filter, search, and tweet updates directly.">
    <meta property="og:type" content="website">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Local Stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <!-- Background Glow Blobs -->
    <div class="bg-gradient-glow"></div>

    <div class="container">
        <!-- Main Navbar / Header -->
        <header class="glass">
            <div class="brand">
                <div class="brand-icon">BQ</div>
                <h1 class="brand-title">BigQuery Release Pulse</h1>
            </div>
            <div class="header-actions">
                <div class="status-badge" id="status-badge-container">
                    <span class="status-dot" id="status-dot"></span>
                    <span id="status-text">Updating...</span>
                </div>
                <button class="btn-icon" id="theme-toggle" aria-label="Toggle visual theme" title="Switch Theme">
                    <!-- Dynamic SVG icon injected by JS -->
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m0 13.5V21.75M21.75 12H19.5M4.5 12H2.25m17.942-7.078l-1.59 1.59M5.002 18.998l-1.59 1.59m16.24-1.59l-1.59-1.59M5.002 5.002l-1.59-1.59M12 8.25a3.75 3.75 0 100 7.5 3.75 3.75 0 000-7.5z"/></svg>
                </button>
            </div>
        </header>

        <!-- Stats Overview Section -->
        <section class="stats-grid" aria-label="Release Metrics Summary">
            <div class="stat-card glass">
                <span class="stat-label">Release Dates</span>
                <span class="stat-value" id="stat-dates">0</span>
            </div>
            <div class="stat-card glass features">
                <span class="stat-label">New Features</span>
                <span class="stat-value" id="stat-features">0</span>
            </div>
            <div class="stat-card glass issues">
                <span class="stat-label">Issues & Deprecations</span>
                <span class="stat-value" id="stat-issues">0</span>
            </div>
            <div class="stat-card glass announcements">
                <span class="stat-label">Changes & Announcements</span>
                <span class="stat-value" id="stat-others">0</span>
            </div>
        </section>

        <!-- Search and Filter Panel -->
        <section class="controls-bar glass" aria-label="Search and Filter Controls">
            <div class="search-filter-group">
                <div class="search-box">
                    <span class="search-icon">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    </span>
                    <input type="text" id="search-input" class="search-input" placeholder="Search releases by topic, keywords or date..." aria-label="Search release notes">
                </div>
                
                <select id="type-filter" class="filter-select" aria-label="Filter by type">
                    <option value="all">All Note Types</option>
                    <option value="feature">Features</option>
                    <option value="announcement">Announcements</option>
                    <option value="change">Changes</option>
                    <option value="issue">Issues</option>
                    <option value="deprecation">Deprecations</option>
                </select>
            </div>
            
            <button class="btn-primary" id="refresh-btn" aria-label="Refresh feed data">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99"/></svg>
                <span>Refresh Feed</span>
            </button>
        </section>

        <!-- Main Workspace: Columns for Feed and Social Publisher -->
        <main class="content-layout">
            <!-- Feed column -->
            <section class="feed-column" aria-label="BigQuery Releases Feed">
                <div id="feed-container">
                    <div class="loading-state">
                        <div class="spinner"></div>
                        <p>Loading release notes...</p>
                    </div>
                </div>
            </section>

            <!-- Social Publisher Sidebar -->
            <aside class="composer-sidebar glass" aria-label="Tweet Composer Panel">
                <h2 class="composer-title">
                    <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                    <span>Social Publisher</span>
                </h2>
                <p class="composer-subtitle">
                    Select updates to add to your composer or draft a custom message to share on X (Twitter).
                </p>
                
                <div class="composer-textarea-container">
                    <textarea id="composer-textarea" class="composer-textarea" placeholder="Select 'Add' or click 'Tweet' on a release card above, or draft your tweet here..." aria-label="Tweet composer draft"></textarea>
                </div>
                
                <div class="composer-footer">
                    <div id="char-counter-group" class="char-counter">
                        <svg class="char-ring" width="24" height="24">
                            <circle cx="12" cy="12" r="10" stroke="rgba(255,255,255,0.08)" stroke-width="2" fill="transparent"/>
                            <circle id="char-ring-circle" cx="12" cy="12" r="10" stroke="var(--color-primary)" stroke-width="2" fill="transparent" stroke-linecap="round"/>
                        </svg>
                        <span id="composer-char-count">280</span>
                    </div>
                </div>
                
                <div class="composer-actions">
                    <button class="btn-sidebar btn-copy" id="composer-copy" aria-label="Copy tweet text to clipboard" title="Copy Text">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 7.5V6.108c0-1.135.845-2.098 1.976-2.192.373-.03.748-.057 1.123-.08M15.75 18H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08M15.75 18.75v-1.875a3.375 3.375 0 00-3.375-3.375h-1.5a1.125 1.125 0 01-1.125-1.125v-1.5A3.375 3.375 0 006.375 7.5H5.25m11.9-3.664A2.251 2.251 0 0015 2.25h-1.5a2.251 2.251 0 00-2.15 1.586m5.8 0c.065.21.1.433.1.664v.75h-6V4.5c0-.231.035-.454.1-.664M6.75 7.5H4.875c-.621 0-1.125.504-1.125 1.125v12c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V16.5a9 9 0 00-9-9z"/></svg>
                        <span>Copy Text</span>
                    </button>
                    <button class="btn-sidebar btn-tweet" id="composer-tweet" aria-label="Share tweet on Twitter" title="Post to X" disabled>
                        <span>Post to X</span>
                    </button>
                </div>
            </aside>
        </main>
    </div>

    <!-- Main JavaScript Logic -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
